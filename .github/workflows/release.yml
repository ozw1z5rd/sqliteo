name: Release App

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, i.e., v1.0, v20.15.10
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: macos-26

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer || true

      - name: Install Dependencies
        run: brew install xcodegen

      - name: Build and Package App Bundle
        run: |
          chmod +x ./scripts/build-release.sh
          ./scripts/build-release.sh

      - name: Release macOS app
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: SQLiteo-macOS.dmg
          generate_release_notes: true
